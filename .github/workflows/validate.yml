name: Validate themes

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # PR scope guard: a PR may only touch a single theme directory
      # (maintainers pushing to main are exempt).
      - name: Check PR scope
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          dirs=$(echo "$changed" | grep -v '^$' | while read -r f; do
            case "$f" in
              themes/*/*) echo "$f" | cut -d/ -f2 ;;
              *) echo "__OUT_OF_SCOPE__:$f" ;;
            esac
          done | sort -u)
          if echo "$dirs" | grep -q '__OUT_OF_SCOPE__'; then
            echo "::error::Theme PRs may only modify files under themes/<your-theme-id>/."
            echo "$dirs" | grep '__OUT_OF_SCOPE__' | sed 's/__OUT_OF_SCOPE__:/  - /'
            exit 1
          fi
          count=$(echo "$dirs" | grep -c . || true)
          if [ "$count" -gt 1 ]; then
            echo "::error::A PR may only touch one theme directory, found: $dirs"
            exit 1
          fi

      - name: Validate all themes
        run: node scripts/validate.mjs

      - name: Regenerate index.json (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -eu
          node scripts/gen_index.mjs
          if git diff --quiet index.json 2>/dev/null && [ -f index.json ]; then
            echo "index.json unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: regenerate index.json"
          git push
